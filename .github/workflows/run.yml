name: Auto Fetch CCTV EPG

# 触发条件配置
on:
  schedule:
    # 定时触发：使用 Cron 表达式（这里代表每天北京时间 00:00 和 12:00 运行）
    # 注：GitHub Actions 的时间是 UTC 时间，北京时间需要减去 8 小时
    - cron: '0 16 * * *'  # 16:00 UTC = 00:00 北京时间
    - cron: '0 4 * * *'   # 04:00 UTC = 12:00 北京时间
  workflow_dispatch:      # 允许你在 GitHub 网页上点击按钮「手动强制触发」

# 任务配置
jobs:
  build-and-run:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟系统作为运行环境

    steps:
    # 步骤 1：把你在 GitHub 仓库里的代码拉取到虚拟机中
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 步骤 2：在虚拟机里安装并配置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 指定 Python 版本

    # 步骤 3：安装脚本需要的第三方依赖库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 步骤 4：执行你的 Python 抓取脚本
    - name: Run EPG parser script
      run: |
        python generate_cctv_epg.py

    # 步骤 5：自动将生成的 cctv_epg.xml 文件提交并推送到你的 GitHub 仓库
    - name: Commit and push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 检查文件是否有变动，如果有变动则提交
        git add cctv_epg.xml
        if ! git diff --staged --quiet; then
          git commit -m "自动更新：最新 CCTV EPG 节目单"
          git push
        else
          echo "节目单无变化，无需提交。"
        fi
